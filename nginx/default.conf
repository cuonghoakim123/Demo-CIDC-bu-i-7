server {
    listen 80;
    server_name _;

    # Proxy /phpmyadmin to phpMyAdmin container
    location /phpmyadmin/ {
        proxy_pass http://phpmyadmin/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Redirect /phpmyadmin to include trailing slash if missing
    location = /phpmyadmin {
        return 301 /phpmyadmin/;
    }

    # Proxy root to Spring Boot app
    location / {
        proxy_pass http://spring-app:80/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
