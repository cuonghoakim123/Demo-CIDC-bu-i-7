<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Lỗi máy chủ nội bộ</title>

    <th:block th:replace="~{layout::link-css}"></th:block>
    <th:block th:replace="~{layout::custom-css}"></th:block>
</head>

<body class="site-shell d-flex flex-column min-vh-100">

<th:block th:replace="~{layout::header}"></th:block>

<main class="flex-fill error-shell">
    <div class="container">
        <div class="section-panel error-card mx-auto" style="max-width: 760px;">
            <div class="error-code fw-bold">500</div>
            <h1 class="error-title mb-3">Lỗi máy chủ nội bộ</h1>
            <p class="auth-copy mb-3">Hệ thống gặp lỗi khi xử lý yêu cầu. Giao diện đã được làm mới, nhưng nếu lỗi vẫn tiếp diễn thì cần kiểm tra log máy chủ để tìm nguyên nhân backend.</p>
            <p class="muted-copy mb-4">Bạn có thể quay lại trang chủ, thử lại thao tác hoặc xem các trang khác trong hệ thống.</p>
            <div class="stack-actions justify-content-center">
                <a href="/" class="btn btn-primary">Về trang chủ</a>
                <a href="/books" class="btn btn-outline-primary">Đến danh mục sách</a>
            </div>
        </div>
    </div>
</main>

<th:block th:replace="~{layout::footer}"></th:block>

</body>
</html>
