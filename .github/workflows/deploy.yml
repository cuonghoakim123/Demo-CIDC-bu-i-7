name: Build and Push Docker Image

run-name: Docker Deploy - ${{ github.ref_name }} @ ${{ github.sha }}

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: docker-deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  # Image hien thi tren server: cuonghoakim123/diamond:latest
  DOCKER_IMAGE: cuonghoakim123/diamond
  DEPLOY_URL: ${{ secrets.DEPLOY_URL }}

jobs:
  docker:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Kiem tra secret Docker Hub (push len cuonghoakim123/diamond)
        run: |
          if [ -z "${{ secrets.DOCKERHUB_USERNAME }}" ]; then
            echo "::error::Thieu GitHub secret DOCKERHUB_USERNAME"
            exit 1
          fi
          if [ -z "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
            echo "::error::Thieu GitHub secret DOCKERHUB_TOKEN (PAT Docker Hub)"
            exit 1
          fi
          if [ "${{ secrets.DOCKERHUB_USERNAME }}" != "cuonghoakim123" ]; then
            echo "::error::DOCKERHUB_USERNAME phai la cuonghoakim123 de push image ${{ env.DOCKER_IMAGE }}"
            exit 1
          fi
          echo "OK: se push va deploy ${{ env.DOCKER_IMAGE }}:latest len S4."

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Maven package (giong Dockerfile, bat loi som truoc khi dong image)
        run: mvn -B clean package -DskipTests

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_IMAGE }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Build and push Docker image (${{ env.DOCKER_IMAGE }})
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          sbom: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Cho Docker Hub cap nhat tag (tranh slot pull image cu/404)
        if: ${{ env.DEPLOY_URL != '' }}
        run: |
          echo "Doi 25 giay de Docker Hub san sang cho tag latest..."
          sleep 25

      # Giong generator Classroom: repo = namespace/name (KHONG kem :latest), tag = latest rieng.
      - name: Triển khai lên DevOps Classroom (S4)
        if: ${{ env.DEPLOY_URL != '' }}
        run: |
          REPO="${{ env.DOCKER_IMAGE }}"
          TAG="latest"
          SLOT=4
          CONTAINER_PORT=80
          DEPLOY_URL=$(echo "${{ env.DEPLOY_URL }}" | tr -d '\r' | xargs)
          DEPLOY_URL=${DEPLOY_URL%\"}
          DEPLOY_URL=${DEPLOY_URL#\"}
          DEPLOY_URL=${DEPLOY_URL%\'}
          DEPLOY_URL=${DEPLOY_URL#\'}
          if [[ -z "$DEPLOY_URL" ]]; then
            echo "DEPLOY_URL dang rong. Hay cap nhat secret DEPLOY_URL (Settings -> Secrets -> Actions)."
            exit 1
          fi
          if [[ ! "$DEPLOY_URL" =~ ^https?:// ]]; then
            DEPLOY_URL="http://$DEPLOY_URL"
          fi
          echo "Deploy S4: repo=${REPO} tag=${TAG} slot=${SLOT} container_port=${CONTAINER_PORT}"
          echo "(Dung dang cuonghoakim123/diamond + tag latest — KHONG ghi :latest vao bien REPO)"

          set +e
          RESPONSE=$(curl -sS \
            --connect-timeout 20 \
            --max-time 180 \
            --retry 3 \
            --retry-delay 5 \
            --retry-connrefused \
            -w $'\n%{http_code}' \
            -X POST \
            "${DEPLOY_URL}?repo=${REPO}&tag=${TAG}&slot=${SLOT}&container_port=${CONTAINER_PORT}&strict_container_port=0" 2>&1)
          CURL_EXIT=$?
          if [ "$CURL_EXIT" -ne 0 ]; then
            echo "curl loi mang/timeout, ma thoat: $CURL_EXIT"
            echo "$RESPONSE"
            exit 1
          fi

          CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          if ! [[ "$CODE" =~ ^[0-9]{3}$ ]]; then
            echo "Khong doc duoc HTTP code tu webhook response"
            echo "$RESPONSE"
            exit 1
          fi
          echo "Webhook HTTP: $CODE"
          if [ "$CODE" -lt 200 ] || [ "$CODE" -ge 300 ]; then
            echo "Deploy thất bại. Xem chi tiết trong nhóm log bên dưới."
            echo "::group::Chi tiết webhook JSON"
            echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
            echo "::endgroup::"
            exit 1
          fi
          echo "Deploy thành công."
          echo "::group::Chi tiết webhook JSON"
          echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
          echo "::endgroup::"
