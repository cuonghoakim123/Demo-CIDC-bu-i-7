name: Build and Push Docker Image

run-name: Docker Deploy - ${{ github.ref_name }} @ ${{ github.sha }}

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: docker-deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: spring-app
  DEPLOY_URL: ${{ secrets.DEPLOY_URL }}

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Triển khai lên DevOps Classroom (S4)
        if: ${{ env.DEPLOY_URL != '' }}
        run: |
          REPO="${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}"
          CONTAINER_PORT=80
          DEPLOY_URL=$(echo "${{ env.DEPLOY_URL }}" | tr -d '\r' | xargs)
          DEPLOY_URL=${DEPLOY_URL%\"}
          DEPLOY_URL=${DEPLOY_URL#\"}
          DEPLOY_URL=${DEPLOY_URL%\'}
          DEPLOY_URL=${DEPLOY_URL#\'}
          if [[ -z "$DEPLOY_URL" ]]; then
            echo "DEPLOY_URL dang rong. Hay cap nhat secret DEPLOY_URL trong GitHub."
            exit 1
          fi
          if [[ ! "$DEPLOY_URL" =~ ^https?:// ]]; then
            DEPLOY_URL="http://$DEPLOY_URL"
            echo "DEPLOY_URL thieu giao thuc, da tu them http://"
          fi
          DEPLOY_HOST=$(echo "$DEPLOY_URL" | sed -E 's#^https?://([^/]+).*$#\1#')
          echo "Deploy host: $DEPLOY_HOST | slot=4 | repo=$REPO | tag=latest | container_port=$CONTAINER_PORT"
          set +e
          RESPONSE=$(curl -sS -w "\n%{http_code}" -X POST \
            --get "$DEPLOY_URL" \
            --data-urlencode "repo=$REPO" \
            --data-urlencode "tag=latest" \
            --data-urlencode "slot=4" \
            --data-urlencode "container_port=$CONTAINER_PORT" \
            --data-urlencode "strict_container_port=0" 2>&1)
          CURL_EXIT=$?
          set -e
          if [ "$CURL_EXIT" -ne 0 ]; then
            echo "curl loi, ma thoat: $CURL_EXIT"
            echo "$RESPONSE"
            exit 1
          fi
          BODY=$(echo "$RESPONSE" | sed "$d")
          CODE=$(echo "$RESPONSE" | tail -n1)
          echo "Webhook HTTP: $CODE"

      - name: Triển khai lên DevOps Classroom (S8)
        run: |
          REPO="cuonghoakim123/diamond"
          CONTAINER_PORT=80
          RESPONSE=$(curl -sS -w "\n%{http_code}" -X POST "${{ secrets.DEPLOY_URL }}?repo=$REPO&tag=latest&slot=8&container_port=$CONTAINER_PORT&strict_container_port=0")
          BODY=$(echo "$RESPONSE" | sed "$d")
          CODE=$(echo "$RESPONSE" | tail -n1)
          echo "Webhook HTTP: $CODE"
          if [ "$CODE" -lt 200 ] || [ "$CODE" -ge 300 ]; then
            echo "Deploy thất bại."
            exit 1
          fi
          echo "Deploy thành công."
